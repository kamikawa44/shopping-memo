<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>お買い物計算メモ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            -webkit-tap-highlight-color: transparent;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }
        .touch-target {
            min-height: 44px;
        }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <div class="max-w-md mx-auto p-4 pb-20">
        <!-- Header -->
        <header class="mb-6 pt-4">
            <h1 class="text-2xl font-bold text-gray-800 flex items-center gap-2">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="text-blue-600"><path d="M6 2 3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4Z"/><path d="M3 6h18"/><path d="M16 10a4 4 0 0 1-8 0"/></svg>
                お買い物計算メモ
            </h1>
            <p class="text-sm text-gray-500">入力して合計を確認・共有できます</p>
        </header>

        <!-- Input Section -->
        <div class="bg-white rounded-2xl shadow-sm p-5 mb-6 border border-gray-100">
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">商品名</label>
                    <input type="text" id="itemName" placeholder="例: 牛乳"
                        class="w-full p-3 bg-white border-2 border-gray-300 rounded-xl shadow-inner focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">金額 (円)</label>
                    <input type="number" id="itemPrice" placeholder="例: 250" inputmode="numeric"
                        class="w-full p-3 bg-white border-2 border-gray-300 rounded-xl shadow-inner focus:border-blue-500 focus:ring-2 focus:ring-blue-200 outline-none transition-all">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-gray-400 mb-1 uppercase tracking-wider">数量</label>
                    <div class="flex items-center gap-3">
                        <button type="button" onclick="changeQty(-1)" aria-label="減らす"
                            class="w-12 h-12 flex items-center justify-center bg-gray-100 border-2 border-gray-300 rounded-xl text-2xl font-bold text-gray-600 active:scale-95 active:bg-gray-200 transition-all touch-target">−</button>
                        <input type="number" id="itemQty" value="1" min="1" inputmode="numeric" readonly
                            class="flex-1 p-3 text-center text-lg font-bold bg-white border-2 border-gray-300 rounded-xl shadow-inner outline-none">
                        <button type="button" onclick="changeQty(1)" aria-label="増やす"
                            class="w-12 h-12 flex items-center justify-center bg-blue-100 border-2 border-blue-300 rounded-xl text-2xl font-bold text-blue-600 active:scale-95 active:bg-blue-200 transition-all touch-target">＋</button>
                    </div>
                </div>
                <button onclick="addItem()" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl transition-all shadow-lg active:scale-95 touch-target">
                    リストに追加する
                </button>
            </div>
        </div>

        <!-- Total Display -->
        <div class="bg-blue-600 text-white rounded-2xl p-6 shadow-xl mb-8 flex justify-between items-center">
            <div>
                <p class="text-blue-100 text-sm font-medium">現在の合計金額</p>
                <div class="flex items-baseline gap-1">
                    <span class="text-3xl font-bold" id="totalAmount">0</span>
                    <span class="text-lg">円</span>
                </div>
            </div>
            <button onclick="shareContent()" 
                class="bg-white/20 hover:bg-white/30 p-3 rounded-full transition-colors active:scale-90"
                title="共有する">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 12v8a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-8"/><polyline points="16 6 12 2 8 6"/><line x1="12" x2="12" y1="2" y2="15"/></svg>
            </button>
        </div>

        <!-- History List -->
        <div class="space-y-3">
            <div class="flex justify-between items-center mb-2">
                <h2 class="font-bold text-gray-700">買い物リスト</h2>
                <button onclick="clearList()" class="text-xs text-red-500 font-medium hover:underline">すべて消去</button>
            </div>
            <div id="historyList" class="space-y-2">
                <!-- Items will appear here -->
                <p id="emptyState" class="text-center py-10 text-gray-400 text-sm italic">アイテムがありません</p>
            </div>
        </div>
    </div>

    <!-- Feedback Message Box -->
    <div id="toast" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-gray-800 text-white px-6 py-3 rounded-full opacity-0 pointer-events-none transition-opacity duration-300 shadow-2xl">
        メッセージ
    </div>

    <script>
        let items = [];

        // Load from LocalStorage if exists
        window.onload = () => {
            const savedItems = localStorage.getItem('shopping_items');
            if (savedItems) {
                items = JSON.parse(savedItems);
                renderItems();
            }
        };

        // 数量の増減（最小1）
        function changeQty(delta) {
            const qtyInput = document.getElementById('itemQty');
            let qty = parseInt(qtyInput.value) || 1;
            qty += delta;
            if (qty < 1) qty = 1;
            qtyInput.value = qty;
        }

        function addItem() {
            const nameInput = document.getElementById('itemName');
            const priceInput = document.getElementById('itemPrice');
            const qtyInput = document.getElementById('itemQty');
            const name = nameInput.value.trim() || "無名の商品";
            const price = parseInt(priceInput.value);
            let qty = parseInt(qtyInput.value) || 1;
            if (qty < 1) qty = 1;

            if (isNaN(price)) {
                showToast("金額を入力してください");
                return;
            }

            const newItem = {
                id: Date.now(),
                name: name,
                price: price,
                qty: qty
            };

            items.push(newItem);
            saveData();
            renderItems();

            // Clear inputs
            nameInput.value = "";
            priceInput.value = "";
            qtyInput.value = "1";
            nameInput.focus();
        }

        function deleteItem(id) {
            items = items.filter(item => item.id !== id);
            saveData();
            renderItems();
        }

        function clearList() {
            if (items.length === 0) return;
            if (confirm("リストをすべて消去しますか？")) {
                items = [];
                saveData();
                renderItems();
                showToast("リストを空にしました");
            }
        }

        function renderItems() {
            const listContainer = document.getElementById('historyList');
            const totalDisplay = document.getElementById('totalAmount');
            const emptyState = document.getElementById('emptyState');

            // Update Total（金額×数量）
            const total = items.reduce((sum, item) => sum + item.price * (item.qty || 1), 0);
            totalDisplay.textContent = total.toLocaleString();

            // Clear and Render List
            listContainer.innerHTML = "";
            
            if (items.length === 0) {
                listContainer.appendChild(emptyState);
                return;
            }

            items.slice().reverse().forEach(item => {
                const itemEl = document.createElement('div');
                itemEl.className = "bg-white flex justify-between items-center p-4 rounded-xl shadow-sm border border-gray-100 animate-in fade-in slide-in-from-bottom-2 duration-300";
                const qty = item.qty || 1;
                const subtotal = item.price * qty;
                itemEl.innerHTML = `
                    <div class="flex-1">
                        <p class="font-bold text-gray-800">${item.name}</p>
                        <p class="text-sm text-gray-500">${item.price.toLocaleString()}円 × ${qty}個 = <span class="font-semibold text-gray-700">${subtotal.toLocaleString()}円</span></p>
                    </div>
                    <button onclick="deleteItem(${item.id})" class="text-gray-300 hover:text-red-500 p-2 transition-colors touch-target">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" x2="6" y1="6" y2="18"></line><line x1="6" x2="18" y1="6" y2="18"></line></svg>
                    </button>
                `;
                listContainer.appendChild(itemEl);
            });
        }

        function saveData() {
            localStorage.setItem('shopping_items', JSON.stringify(items));
        }

        function shareContent() {
            if (items.length === 0) {
                showToast("共有するアイテムがありません");
                return;
            }

            const total = items.reduce((sum, item) => sum + item.price * (item.qty || 1), 0);
            let shareText = "【お買い物メモ】\n";
            items.forEach(item => {
                const qty = item.qty || 1;
                const subtotal = item.price * qty;
                shareText += `・${item.name}: ${item.price.toLocaleString()}円 × ${qty}個 = ${subtotal.toLocaleString()}円\n`;
            });
            shareText += `------------------\n合計: ${total.toLocaleString()}円`;

            if (navigator.share) {
                navigator.share({
                    title: 'お買い物メモ',
                    text: shareText
                }).catch(console.error);
            } else {
                // Fallback: Copy to clipboard
                const el = document.createElement('textarea');
                el.value = shareText;
                document.body.appendChild(el);
                el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
                showToast("クリップボードにコピーしました（共有機能未対応）");
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.opacity = "1";
            setTimeout(() => {
                toast.style.opacity = "0";
            }, 2000);
        }
    </script>
</body>
</html>
